<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book a Ride | Mondford Transport</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- NAVBAR -->
<header>
    <div class="logo">MONDFORD TRANSPORT SERVICES</div>
    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="index.html#services">Services</a></li>
            <li><a href="booking.html">Booking</a></li>
            <li><a href="index.html#contact">Contact</a></li>
        </ul>
    </nav>
</header>

<!-- HERO -->
<section class="booking-hero">
    <h1>Book a Ride</h1>
    <p>Fast, safe and reliable transport at your service</p>
</section>

<!-- BOOKING FORM -->
<section class="booking-page">
    <div class="form-container">
        <h2>Fill in your details</h2>

        <form>
            <input type="text" placeholder="Full Name" required>
            <input type="tel" placeholder="Phone Number" required>
            <input type="text" placeholder="Pickup Location" required>
            <input type="text" placeholder="Destination" required>

            <label>Select Date & Time</label>
            <input type="datetime-local" required>

            <button type="submit">Request Ride</button>
        </form>
    </div>
</section>

<!-- FOOTER -->
<footer>
    <p>© 2026 Mondford Transport Services. All rights reserved.</p>
</footer>

</body>
</html>
